<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

        /* Navbar */
        .navbar { display: flex; align-items: center; justify-content: space-between;
                  padding: 0.75rem 2rem; background: #1a1a2e; color: #fff; }
        .navbar-brand { font-size: 1.25rem; font-weight: 700; cursor: pointer; }
        .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
        .user-info { font-size: 0.9rem; opacity: 0.85; }

        /* Cards */
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.12);
                padding: 1.5rem; }

        /* Main layout */
        .main-content { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .create-post { margin-bottom: 2rem; }
        .posts-section h2, .create-post h2 { margin-bottom: 1rem; font-size: 1.2rem; }

        /* Post list */
        .post-list { display: flex; flex-direction: column; gap: 1rem; }
        .post-card { background: #fff; border-radius: 8px;
                     box-shadow: 0 1px 4px rgba(0,0,0,.12); padding: 1.25rem; }
        .post-card.editing { border: 2px solid #4a6cf7; }
        .post-header { margin-bottom: 0.6rem; }
        .post-title { font-size: 1.1rem; margin-bottom: 0.25rem; }
        .post-meta { font-size: 0.8rem; color: #666; }
        .post-content { line-height: 1.6; color: #444; margin-bottom: 0.75rem; }
        .post-actions { display: flex; gap: 0.5rem; }
        .empty-state { color: #888; text-align: center; padding: 2rem 0; }

        /* Auth */
        .auth-container { display: flex; justify-content: center; padding: 3rem 1rem; }
        .auth-card { width: 100%; max-width: 400px; }
        .auth-card h2 { margin-bottom: 1.25rem; }
        .auth-switch { margin-top: 1rem; font-size: 0.9rem; color: #555; }
        .auth-switch a { color: #4a6cf7; cursor: pointer; text-decoration: underline; }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem;
                            font-size: 0.9rem; font-weight: 500; }
        .form-input, .form-textarea {
            width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #ccc;
            border-radius: 6px; font-size: 0.95rem; font-family: inherit; }
        .form-input:focus, .form-textarea:focus {
            outline: none; border-color: #4a6cf7;
            box-shadow: 0 0 0 2px rgba(74,108,247,.2); }
        .form-textarea { resize: vertical; }

        /* Buttons */
        .btn { padding: 0.5rem 1.1rem; border: none; border-radius: 6px; cursor: pointer;
               font-size: 0.9rem; font-weight: 500; background: #4a6cf7; color: #fff; }
        .btn:hover { background: #3a5ce0; }
        .btn-outline { background: transparent; border: 1px solid #4a6cf7; color: #4a6cf7; }
        .btn-outline:hover { background: #eef0ff; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #565e64; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.82rem; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #b02a37; }
        .btn-full { width: 100%; }

        /* Error banner */
        .error-banner { display: flex; align-items: center; justify-content: space-between;
                        background: #fff3cd; border: 1px solid #ffc107; color: #664d03;
                        padding: 0.75rem 1.5rem; font-size: 0.9rem; }
        .close-btn { background: none; border: none; font-size: 1.1rem;
                     cursor: pointer; color: #664d03; }
    </style>
</head>
<body>
<!-- Trunk injects the WASM bundle here -->
</body>
</html>
